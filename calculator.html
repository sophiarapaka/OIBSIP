<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calc — Simple Calculator</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #f5f5f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
    }

    h1 {
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.15em;
      color: #999;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .calc {
      background: #ffffff;
      border-radius: 24px;
      width: 320px;
      overflow: hidden;
      box-shadow: 0 2px 40px rgba(0,0,0,0.07);
    }

    .display {
      padding: 32px 28px 24px;
      background: #fff;
      border-bottom: 1px solid #f0f0f0;
    }

    .history {
      font-size: 13px;
      color: #bbb;
      min-height: 20px;
      text-align: right;
      margin-bottom: 6px;
      letter-spacing: 0.02em;
    }

    .number {
      font-size: 42px;
      font-weight: 300;
      color: #1a1a1a;
      text-align: right;
      letter-spacing: -1px;
      word-break: break-all;
      line-height: 1.1;
    }

    .number.error { font-size: 22px; color: #e55; }

    .keypad {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: #f0f0f0;
    }

    .key {
      background: #fff;
      border: none;
      padding: 20px 0;
      font-size: 17px;
      font-weight: 400;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      color: #1a1a1a;
      transition: background 0.1s;
    }

    .key:active { background: #f5f5f0; }

    .key.fn {
      color: #888;
      font-size: 14px;
      font-weight: 500;
    }

    .key.op {
      color: #4a90d9;
      font-size: 20px;
      font-weight: 300;
    }

    .key.op.active-op { background: #eef4fc; }

    .key.eq {
      background: #1a1a1a;
      color: #fff;
      font-size: 22px;
      font-weight: 300;
    }

    .key.eq:active { background: #333; }

    .key.zero {
      grid-column: span 2;
      text-align: left;
      padding-left: 28px;
    }
  </style>
</head>
<body>

<h1>Calculator</h1>

<div class="calc">
  <div class="display">
    <div class="history" id="history"></div>
    <div class="number" id="number">0</div>
  </div>

  <div class="keypad">
    <button class="key fn" onclick="clearAll()">AC</button>
    <button class="key fn" onclick="toggleSign()">+/−</button>
    <button class="key fn" onclick="percent()">%</button>
    <button class="key op" id="op-/" onclick="setOp('/')">÷</button>

    <button class="key" onclick="input('7')">7</button>
    <button class="key" onclick="input('8')">8</button>
    <button class="key" onclick="input('9')">9</button>
    <button class="key op" id="op-*" onclick="setOp('*')">×</button>

    <button class="key" onclick="input('4')">4</button>
    <button class="key" onclick="input('5')">5</button>
    <button class="key" onclick="input('6')">6</button>
    <button class="key op" id="op--" onclick="setOp('-')">−</button>

    <button class="key" onclick="input('1')">1</button>
    <button class="key" onclick="input('2')">2</button>
    <button class="key" onclick="input('3')">3</button>
    <button class="key op" id="op-+" onclick="setOp('+')">+</button>

    <button class="key zero" onclick="input('0')">0</button>
    <button class="key" onclick="inputDot()">.</button>
    <button class="key eq" onclick="evaluate()">=</button>
  </div>
</div>

<script>
  let cur = '0', prev = '', op = '', freshCalc = false;

  const numEl = document.getElementById('number');
  const histEl = document.getElementById('history');
  const sym = { '/': '÷', '*': '×', '-': '−', '+': '+' };

  function render() {
    numEl.textContent = cur;
    numEl.className = 'number' + (cur === 'Error' ? ' error' : '');
  }

  function highlightOp(o) {
    document.querySelectorAll('.key.op').forEach(b => b.classList.remove('active-op'));
    if (o) document.getElementById('op-' + o)?.classList.add('active-op');
  }

  function input(n) {
    if (cur === 'Error') return;
    if (freshCalc) { cur = n; freshCalc = false; }
    else cur = cur === '0' ? n : cur + n;
    render();
  }

  function inputDot() {
    if (cur === 'Error') return;
    if (freshCalc) { cur = '0.'; freshCalc = false; }
    else if (!cur.includes('.')) cur += '.';
    render();
  }

  function setOp(o) {
    if (cur === 'Error') return;
    if (prev && op && !freshCalc) evaluate();
    prev = cur; op = o; freshCalc = true;
    histEl.textContent = prev + ' ' + sym[o];
    highlightOp(o);
  }

  function evaluate() {
    if (!prev || !op) return;
    const a = parseFloat(prev), b = parseFloat(cur);
    let result;
    if (op === '+') result = a + b;
    else if (op === '-') result = a - b;
    else if (op === '*') result = a * b;
    else if (op === '/') result = b === 0 ? 'Error' : a / b;

    histEl.textContent = prev + ' ' + sym[op] + ' ' + cur + ' =';
    cur = result === 'Error' ? 'Error' : parseFloat(result.toFixed(10)).toString();
    prev = ''; op = ''; freshCalc = true;
    highlightOp(null);
    render();
  }

  function clearAll() {
    cur = '0'; prev = ''; op = ''; freshCalc = false;
    histEl.textContent = ''; highlightOp(null); render();
  }

  function toggleSign() {
    if (cur === 'Error' || cur === '0') return;
    cur = (parseFloat(cur) * -1).toString(); render();
  }

  function percent() {
    if (cur === 'Error') return;
    cur = (parseFloat(cur) / 100).toString(); render();
  }

  document.addEventListener('keydown', e => {
    if ('0123456789'.includes(e.key)) input(e.key);
    else if (e.key === '.') inputDot();
    else if (['+','-','*','/'].includes(e.key)) setOp(e.key);
    else if (e.key === 'Enter' || e.key === '=') evaluate();
    else if (e.key === 'Escape') clearAll();
    else if (e.key === 'Backspace') {
      if (cur.length > 1) { cur = cur.slice(0, -1); render(); }
      else { cur = '0'; render(); }
    }
  });
</script>

</body>
</html>
